<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CSV/TSV 転置ツール</title>
  <style>
    #csvInput, #csvOutput {
      white-space: pre;
      overflow-x: auto;
      overflow-y: auto;
      font-family: monospace;
      border: 2px solid #ccc;
      padding: 5px;
      width: 100%;
      box-sizing: border-box;
    }
    #csvInput.dragover {
      background-color: #eef;
      border-color: #44f;
    }
    #csvInputWrapper {
      width: 100%;
      position: relative;
      display: inline-block;
    }
    #fileButtonOverlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.9;
      background: #fff;
      padding: 6px 12px;
      border: 1px solid #888;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      z-index: 10;
    }
    #fileButtonOverlay:hover {
      opacity: 1;
    }
    #clearInputOverlay {
      position: absolute;
      top: 6px;
      right: 6px;
      cursor: pointer;
      background: #fff;
      padding: 4px 8px;
      border: 1px solid #aaa;
      border-radius: 4px;
      font-size: 10px;
      opacity: 0.85;
      display: none; /* 入力が空のときは非表示 */
      z-index: 11;
    }
    #clearInputOverlay:hover {
      opacity: 1;
    }
    #transposeBtn {
      display: block;
      width: 100%;
      padding: 14px 0;
      font-size: 18px;
      font-weight: bold;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 10px 0;
    }
    #transposeBtn:hover {
      background: #357ac8;
    }

    /* ▼ コピーアイコン（SVG） */
    #copyIconOverlay {
      position: absolute;
      top: 6px;
      right: 6px;
      cursor: pointer;
      opacity: 0.85;
      background: #fff;
      padding: 4px;
      border: 1px solid #aaa;
      border-radius: 4px;
      z-index: 10;
    }
    #copyIconOverlay:hover {
      opacity: 1;
    }
    #copyLabel {
      font-size: 10pt;
      margin-left: 4px;
      vertical-align: top;
    }

    /* ▼ 出力textareaのラッパー */
    #csvOutputWrapper {
      width: 100%;
      position: relative;
      display: inline-block;
    }

    /* ▼ ブラウザ横幅100%のダウンロードボタン */
    #downloadBtnWide {
      display: block;
      width: 100%;
      padding: 14px 0;
      font-size: 18px;
      font-weight: bold;
      background: #5cb85c;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 10px 0;
    }
    #downloadBtnWide:hover {
      background: #4e9e4e;
    }
  </style>
</head>
<body>
  <h2>入力: CSV/TSV を貼り付け（ドラッグ＆ドロップ可）またはファイル選択</h2>

  <div id="csvInputWrapper">
    <textarea id="csvInput" rows="10" cols="80"
      placeholder="ここにCSV/TSVを貼り付け、またはファイルをドラッグ＆ドロップ"
    ></textarea>

    <label id="fileButtonOverlay">
      ファイル選択
      <input type="file" id="fileInput" accept=".csv,.tsv" style="display:none;">
    </label>

    <div id="clearInputOverlay">クリア</div>
  </div>

  <button id="transposeBtn">転置する</button>

  <!-- ▼ 出力textareaのラッパー -->
  <div id="csvOutputWrapper">
    <textarea id="csvOutput" rows="10" cols="80" readonly
      placeholder="転置するボタンを押すと結果がここに表示されます"
    ></textarea>

    <!-- ▼ インラインSVGコピーアイコン -->
    <div id="copyIconOverlay">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#333"
          d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
      </svg>
      <span id="copyLabel">コピー</span>
    </div>
  </div>

  <!-- ▼ ダウンロードボタン -->
  <button id="downloadBtnWide">CSVとしてダウンロード（常にBOM付き）</button>

  <script>
    const fileInput = document.getElementById('fileInput');
    const csvInput = document.getElementById('csvInput');
    const csvOutput = document.getElementById('csvOutput');
    const transposeBtn = document.getElementById('transposeBtn');
    const downloadBtnWide = document.getElementById('downloadBtnWide');
    const copyIconOverlay = document.getElementById('copyIconOverlay');

    /* ▼ コンテキストメニュー */
    csvOutput.addEventListener("contextmenu", (e) => {
      e.preventDefault();

      const menu = document.createElement("div");
      menu.style.fontSize = "12px";
      menu.style.position = "fixed";
      menu.style.top = e.clientY + "px";
      menu.style.left = e.clientX + "px";
      menu.style.background = "#fff";
      menu.style.border = "1px solid #ccc";
      menu.style.padding = "4px";
      menu.style.zIndex = 9999;

      const addItem = (label, handler) => {
        const item = document.createElement("div");
        item.textContent = label;
        item.style.padding = "6px 12px";
        item.style.cursor = "pointer";
        item.addEventListener("click", () => {
          handler();
          document.body.removeChild(menu);
        });
        item.addEventListener("mouseover", () => item.style.background = "#eef");
        item.addEventListener("mouseout", () => item.style.background = "#fff");
        menu.appendChild(item);
      };

      addItem("TSVでクリップボードにコピー", () => {
        navigator.clipboard.writeText(csvOutput.value);
        showCopiedLabel();
      });

      addItem("CSVでクリップボードにコピー", () => {
        const rows = csvOutput.value.split(/\r?\n/).map(line => line.split("\t"));
        const csvText = rows.map(r => r.join(",")).join("\r\n");
        navigator.clipboard.writeText(csvText);
        showCopiedLabel();
      });

      addItem("CSVでダウンロード（BOM付き）", () => {
        downloadCsv();
      });

      document.body.appendChild(menu);

      document.addEventListener("click", () => {
        if (document.body.contains(menu)) {
          document.body.removeChild(menu);
        }
      }, { once: true });
    });

    function showCopiedLabel() {
      const label = document.getElementById("copyLabel");
      label.textContent = "コピーしました";

      setTimeout(() => {
        label.textContent = "コピー";
      }, 3000);
    }

    /* ▼ コピーアイコン（TSV形式でコピー） */
    copyIconOverlay.addEventListener("click", async () => {
      const text = csvOutput.value;
      if (!text) {
        alert("転置結果がありません");
        return;
      }
      await navigator.clipboard.writeText(text);
      showCopiedLabel();
      // alert("TSV形式でコピーしました");
    });

    /* ▼ ダウンロード処理（共通化） */
    function downloadCsv() {
      const text = csvOutput.value;
      if (!text) {
        alert("転置結果がありません");
        return;
      }

      const rows = text.split(/\r?\n/).map(line => line.split("\t"));
      const csvText = rows.map(r => r.join(",")).join("\r\n");

      const bom = "\uFEFF";
      const blob = new Blob([bom + csvText], { type: "text/csv;charset=utf-8;" });

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "transposed.csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    downloadBtnWide.addEventListener("click", downloadCsv);

    /* 入力textareaの状態反映 */
    const clearInputOverlay = document.getElementById("clearInputOverlay");
    const fileButtonOverlay = document.getElementById("fileButtonOverlay");

    function updateInputUI() {
      const hasText = csvInput.value.trim().length > 0;

      clearInputOverlay.style.display = hasText ? "block" : "none";
      fileButtonOverlay.style.display = hasText ? "none" : "block";
    }

    // 入力欄の変更を監視
    csvInput.addEventListener("input", updateInputUI);

    clearInputOverlay.addEventListener("click", () => {
      csvInput.value = "";
      csvOutput.value = "";
      updateInputUI();
    });

    /* ▼ 転置処理など */
    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        let text = e.target.result;
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        csvInput.value = text;
        updateInputUI();
      };
      reader.readAsText(file, "utf-8");
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (file) loadFile(file);
    });

    csvInput.addEventListener("dragover", (e) => {
      e.preventDefault();
      csvInput.classList.add("dragover");
    });

    csvInput.addEventListener("dragleave", () => {
      csvInput.classList.remove("dragover");
    });

    csvInput.addEventListener("drop", (e) => {
      e.preventDefault();
      csvInput.classList.remove("dragover");
      const file = e.dataTransfer.files[0];
      if (file) loadFile(file);
    });

    function detectDelimiter(text) {
      return text.includes("\t") ? "\t" : ",";
    }

    function transposeCsv(text, delimiter) {
      const rows = text.split(/\r?\n/).map(line => line.split(delimiter));
      const maxCols = Math.max(...rows.map(r => r.length));
      const normalized = rows.map(r => {
        const copy = r.slice();
        while (copy.length < maxCols) copy.push("");
        return copy;
      });
      const transposed = [];
      for (let c = 0; c < maxCols; c++) {
        const newRow = [];
        for (let r = 0; r < normalized.length; r++) {
          newRow.push(normalized[r][c]);
        }
        transposed.push(newRow);
      }
      return transposed;
    }

    function convertDelimiter(rows, toDelim) {
      return rows.map(row => row.join(toDelim)).join("\r\n");
    }

    transposeBtn.addEventListener("click", () => {
      const inputText = csvInput.value.trim();
      if (!inputText) {
        alert("CSV/TSVを入力してください");
        return;
      }
      if (inputText.includes('"')) {
        alert("ダブルクォートを含むCSVは未サポートです");
        return;
      }
      const delimiter = detectDelimiter(inputText);
      const transposed = transposeCsv(inputText, delimiter);
      const converted = convertDelimiter(transposed, "\t");
      csvOutput.value = converted;
    });
  </script>
</body>
</html>
